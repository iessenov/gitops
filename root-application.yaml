apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/iessenov/gitops.git
    targetRevision: main
    path: apps
    directory:
      recurse: true  #if the folder contains only subfolders, Argo CD sees it as "empty".
      include: '**/application.yaml'
#      exclude: 'nginx-app/**,whoami-helm/**'
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
