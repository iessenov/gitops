apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: whoami-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/iessenov/gitops
    targetRevision: main
    path: apps/whoami/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: whoami
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
