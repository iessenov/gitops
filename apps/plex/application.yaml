apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: plex
  namespace: argocd
spec:
  project: default

  sources:
    - repoURL: https://github.com/plexinc/pms-docker
      path: charts/plex-media-server
      targetRevision: master
      helm:
        valueFiles:
          - $values/apps/plex/values.yaml
    - repoURL: https://github.com/iessenov/gitops.git
      targetRevision: main
      ref: values
    - repoURL: https://github.com/iessenov/gitops.git
      path: apps/plex/manifests
      targetRevision: main

  destination:
    server: https://kubernetes.default.svc
    namespace: plex

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true