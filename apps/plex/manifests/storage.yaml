---
# PV for Plex config
# FOLDER TO CREATE: /var/lib/plex/config
# Store Plex media server database and settings
apiVersion: v1
kind: PersistentVolume
metadata:
  name: plex-config-pv
spec:
  capacity:
    storage: 2Gi
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  local:
    path: /var/lib/plex/config
  nodeAffinity:
    required:
      nodeSelectorTerms:
      - matchExpressions:
        - key: plex
          operator: In
          values:
          - "true"
---
# PV for Plex transcode
# FOLDER TO CREATE: /var/lib/plex/transcode
# Temporary storage for video transcoding
apiVersion: v1
kind: PersistentVolume
metadata:
  name: plex-transcode-pv
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  local:
    path: /var/lib/plex/transcode
  nodeAffinity:
    required:
      nodeSelectorTerms:
      - matchExpressions:
        - key: plex
          operator: In
          values:
          - "true"
---
# PV for Plex media
# Your actual media files (movies, shows, music)
apiVersion: v1
kind: PersistentVolume
metadata:
  name: plex-media-pv
spec:
  capacity:
    storage: 2Ti
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  local:
    path: /media
  nodeAffinity:
    required:
      nodeSelectorTerms:
      - matchExpressions:
        - key: plex
          operator: In
          values:
          - "true"
---
# Manually create the Plex config PVC so it has the storageClassName
# This will be referenced by the Plex StatefulSet via pms.configExistingClaim
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: plex-config
  namespace: plex
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 2Gi
---
# PVC for Plex transcode
# This binds to plex-transcode-pv
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: plex-transcode
  namespace: plex
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi
  volumeName: plex-transcode-pv
---
# PVC for Plex media
# This binds to plex-media-pv
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: plex-media
  namespace: plex
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 2Ti
  volumeName: plex-media-pv
