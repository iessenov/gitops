apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nextcloud
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://github.com/nextcloud/helm
      path: charts/nextcloud
      targetRevision: main
      helm:
        valueFiles:
          - $values/apps/nextcloud/values.yaml
    - repoURL: https://github.com/iessenov/gitops.git
      path: apps/plex/manifests
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: nextcloud
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true