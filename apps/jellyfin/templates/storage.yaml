# NOTE: StorageClass is managed by infrastructure/storageclass
# PV for Jellyfin config
# FOLDER TO CREATE: /var/lib/jellyfin/config
# Store Jellyfin settings, libraries, and configurations
apiVersion: v1
kind: PersistentVolume
metadata:
  name: jellyfin-config-pv
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  local:
    path: /var/lib/jellyfin/config
  nodeAffinity:
    required:
      nodeSelectorTerms:
      - matchExpressions:
        - key: jellyfin
          operator: In
          values:
          - "true"
---
# PV for Jellyfin cache
# FOLDER TO CREATE: /var/lib/jellyfin/cache
# Store cached/transcoded media files (can be regenerated)
apiVersion: v1
kind: PersistentVolume
metadata:
  name: jellyfin-cache-pv
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  local:
    path: /var/lib/jellyfin/cache
  nodeAffinity:
    required:
      nodeSelectorTerms:
      - matchExpressions:
        - key: jellyfin
          operator: In
          values:
          - "true"
---
# PV for Jellyfin media
# FOLDER TO CREATE: /var/lib/jellyfin/media
# Store your actual media files (movies, shows, music, etc.)
apiVersion: v1
kind: PersistentVolume
metadata:
  name: jellyfin-media-pv
spec:
  capacity:
    storage: 2Ti
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  local:
    path: /media
  nodeAffinity:
    required:
      nodeSelectorTerms:
      - matchExpressions:
        - key: jellyfin
          operator: In
          values:
          - "true"

