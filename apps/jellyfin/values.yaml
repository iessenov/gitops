image:
  repository: jellyfin/jellyfin
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  type: ClusterIP
  port: 80
  containerPort: 8096

persistence:
  config:
    enabled: true
    accessMode: ReadWriteOnce
    size: 1Gi
    storageClass: local-path
    volumeName: jellyfin-config-pv
  cache:
    enabled: true
    # ReadWriteOnce (RWO) access mode allows the PersistentVolume to be mounted
    # as read-write by a single node at a time. This is the common choice for
    # stateful applications like Jellyfin that require exclusive access to storage
    # and don't need to be accessed simultaneously from multiple nodes.
    accessMode: ReadWriteOnce 
    size: 5Gi
    storageClass: local-path
    volumeName: jellyfin-cache-pv
  media:
    enabled: true
    accessMode: ReadWriteOnce
    size: 2Ti
    storageClass: local-path
    mountPath: /media
    volumeName: jellyfin-media-pv

securityContext:
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

resources:
  requests:
    cpu: "500m"
    memory: "1Gi"
  limits:
    cpu: "4"
    memory: "4Gi"

nodeSelector:
  jellyfin: "true"

extraVolumes:
  - name: dri
    hostPath:
      path: /dev/dri

extraVolumeMounts:
  - name: dri
    mountPath: /dev/dri
