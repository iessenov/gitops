# Traefik Helm Chart Values

# Deployment configuration
deployment:
  kind: Deployment
  enabled: true
  
# Ports configuration
ports:
  web:
    port: 80 #The port your application listens on inside the container.
    protocol: TCP
  websecure:
    # HTTPS port
    port: 443
    protocol: TCP
  metrics:
    # Prometheus metrics
    port: 9100
    expose:
      default: false
    protocol: TCP

# Enable dashboard (optional - disable in production)
ingressRoute:
  dashboard:
    enabled: true
    # Uncomment to expose dashboard via ingress
    # matchRule: Host(`traefik.yourdomain.com`)
    # entryPoints: ["websecure"]

# Service configuration - disabled when using hostPort with DaemonSet
service:
  enabled: true
  type: NodePort
  externalIPs:
    - 192.168.100.22  # Node IP

# Logs
logs:
  general:
    level: INFO
  access:
    enabled: true

# Enable Prometheus metrics
metrics:
  prometheus:
    enabled: true
    addEntryPointsLabels: true
    addServicesLabels: true

# Providers
providers:
  kubernetesCRD:
    enabled: true
    allowCrossNamespace: true
  kubernetesIngress:
    enabled: true
    allowExternalNameServices: true
    publishedService:
      enabled: true
      namespace: traefik
      name: traefik

# Additional arguments
additionalArguments:
  # Enable access logs
  - "--accesslog=true"
  # Enable API and dashboard
  - "--api.dashboard=true"

# Resources (adjust as needed)
resources:
  requests:
    cpu: "100m"
    memory: "50Mi"
  limits:
    cpu: "300m"
    memory: "150Mi"

# Security context
securityContext:
  capabilities:
    drop: [ALL]
  readOnlyRootFilesystem: true
  runAsGroup: 65532
  runAsNonRoot: true
  runAsUser: 65532

podSecurityContext:
  fsGroup: 65532

# Tolerations to run on control-plane nodes (same as ingress-nginx)
tolerations:
  - key: "node-role.kubernetes.io/control-plane"
    operator: "Exists"
    effect: "NoSchedule"
  - key: "node-role.kubernetes.io/master"
    operator: "Exists"
    effect: "NoSchedule"
