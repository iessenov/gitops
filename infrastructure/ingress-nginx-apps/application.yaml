apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx-apps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/iessenov/gitops.git
    targetRevision: main
    path: infrastructure/ingress-nginx-apps
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx-apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
