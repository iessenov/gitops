apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: storageclass
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/iessenov/gitops.git
    targetRevision: main
    path: infrastructure/storageclass

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
