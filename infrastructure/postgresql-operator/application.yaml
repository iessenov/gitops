apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgresql-operator
  namespace: argocd
spec:
  project: default

  sources:
    - repoURL: https://cloudnative-pg.github.io/charts # https://github.com/cloudnative-pg/charts
      chart: cloudnative-pg # charts/cloudnative-pg
      targetRevision: 0.27.1
      helm:
        valueFiles:
          - $values/infrastructure/postgresql-operator/values.yaml
    - repoURL: https://github.com/iessenov/gitops.git
      targetRevision: main
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: postgresql-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true # important for big CRDs