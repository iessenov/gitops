# Docs at https://cloudnative-pg.io/docs/1.28/quickstart
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: shared-postgresql
spec:
  instances: 3

  imageName: ghcr.io/cloudnative-pg/postgresql:18.3-pg16
  # The immutable infrastructure paradigm requires that you always point to a specific version of the container image. 
  # Never use tags like latest or 13 in a production environment as it might lead to unpredictable scenarios in terms of update policies and version consistency in the cluster. 

  # Persistent storage configuration
  storage:
    size: 20Gi
    pvcTemplate:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 5Gi
      storageClassName: local-path
      volumeMode: Filesystem
    resizeInUseVolumes: true

  # Bootstrap only creates the FIRST database
  bootstrap:
    initdb:
      database: app1db
      owner: app1user
      secret:
        name: app1-secret
      postInitSQL:
        - CREATE ROLE app2user LOGIN;
        - CREATE ROLE app3user LOGIN;
        - CREATE DATABASE app2db OWNER app2user;
        - CREATE DATABASE app3db OWNER app3user;

  # Managed roles for all application users
  managed:
    roles:
      - name: app1user
        login: true
        passwordSecret:
          name: app1-secret
      - name: app2user
        login: true
        passwordSecret:
          name: app2-secret
      - name: app3user
        login: true
        passwordSecret:
          name: app3-secret

  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: "512MB"

  monitoring:
    enablePodMonitor: true

  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "1"
      memory: "2Gi"

  affinity:
    enablePodAntiAffinity: true

  enableSuperuserAccess: true # Disable for Production environments
  superuserSecret:
    name: postgres-superuser

  #nodeMaintenanceWindow:
  #  inProgress: false
  #  reusePVC: false

  # Backup configuration
  #   add later