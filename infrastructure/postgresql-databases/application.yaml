apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgresql-cluster
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/iessenov/gitops.git
    targetRevision: main
    path: infrastructure/postgresql-databases
    directory:
      recurse: true
      exclude: application.yaml
      
  destination:
    server: https://kubernetes.default.svc
    namespace: postgresql-db

  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - Prune=false
  
  ignoreDifferences:
    - group: postgresql.cnpg.io
      kind: Cluster
      managedFieldsManagers:
        - cloudnative-pg
        - cnpg-controller-manager
      jsonPointers:
        - /spec/storage/resizeInUseVolumes
        - /status