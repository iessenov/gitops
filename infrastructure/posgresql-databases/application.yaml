apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgresql-cluster
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/iessenov/gitops.git
    targetRevision: main
    path: infrastructure/postgresql-databases
    directory:
      recurse: true
      
  destination:
    server: https://kubernetes.default.svc
    namespace: postgresql-db

  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - Prune=false